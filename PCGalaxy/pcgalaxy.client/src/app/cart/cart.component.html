<div class="component-container">
  <h1>Cart</h1>
  <div class="product-container">
    <ng-container *ngIf="currentUser; else notLoggedIn">
      <div class="message" *ngIf="cartItems.length === 0">
        <p>Your cart is empty.</p>
      </div>
      <div *ngIf="cartItems.length > 0" class="cart-items-container">
        <div class="cart-item" *ngFor="let item of cartItems">
          <img
            [src]="'data:image/jpeg;base64,' + item.product!.imageBase64"
            [alt]="item.product?.name || 'Product'"
            class="product-image"
          />
          <div class="item-details">
            <h3>
              <a [routerLink]="['/product', item.product!.id]" class="product-link">
                {{ item.product!.name }}
              </a>
            </h3>
            
            <p>Price: ${{ item.product!.price }} x {{ item.quantity }} = <strong>${{ item.product!.price * item.quantity }}</strong></p>
            
            <div class="quantity-controls">
              <button mat-icon-button color="primary" (click)="decreaseQuantity(item)" [disabled]="item.quantity <= 1">
                <mat-icon>remove</mat-icon>
              </button>
              
              <input 
                type="number" 
                class="quantity-input" 
                [(ngModel)]="item.quantity" 
                (change)="onQuantityChange(item)"
                (keypress)="preventInvalidCharacters($event)"
                min="1"
                [max]="item.product!.stock"
              />

              <button mat-icon-button color="primary" (click)="increaseQuantity(item)" [disabled]="item.quantity >= item.product!.stock">
                <mat-icon>add</mat-icon>
              </button>
            </div>
            
            <p *ngIf="item.quantity >= item.product!.stock" style="color: red; font-size: 0.8rem; margin: 0;">
              Maximum stock reached for this product.
            </p>
          </div>
          <button mat-icon-button (click)="deleteCartItem(item.id!)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
        <div class="cart-summary">
          <p>Delivery Fee: ${{ deliveryFee }}</p>
          <p>
            <strong>Total: ${{ total }}</strong>
          </p>
        </div>
        <br />
        <button mat-raised-button [routerLink]="['/checkout']">Proceed to Checkout</button>
      </div>
    </ng-container>
    <ng-template #notLoggedIn>
      <p class="message">You must be logged in to view your cart.</p>
    </ng-template>
  </div>
</div>
